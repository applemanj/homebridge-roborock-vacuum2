name: "Publish to npm"

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: "npm-publish-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish:
    name: "Publish package"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --runInBand
        env:
          CI: true

      - name: Build package
        run: npm run build

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm for existing version
        id: npm
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.package.outputs.version }} is already published. Skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.published != 'true'
        run: npm publish

      - name: Check GitHub release for current version
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.package.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists. Skipping GitHub release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from changelog
        if: steps.release.outputs.exists != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          awk -v version="$VERSION" '
            $0 == "## " version { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release-notes.md

          if [ ! -s release-notes.md ]; then
            printf 'Release %s\n' "$VERSION" > release-notes.md
          fi

      - name: Create GitHub release
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.release.outputs.tag }}" \
            --notes-file release-notes.md
